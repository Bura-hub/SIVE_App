name: mtesive_app

services:
  # ================================
  # Base de datos PostgreSQL
  # ================================
  db:
    image: postgres:17-alpine
    container_name: mte_postgres_prod
    environment:
      POSTGRES_DB: ${name_db}
      POSTGRES_USER: ${user_postgres}
      POSTGRES_PASSWORD: ${password_user_postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./backups:/backups
    networks:
      - mte_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${user_postgres} -d ${name_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ================================
  # Redis para Celery
  # ================================
  redis:
    image: redis:7-alpine
    container_name: mte_redis_prod
    # NOTA (A9): pasar --requirepass en la línea de comandos expone la contraseña
    # en `docker inspect` / `ps` dentro del contenedor. Alternativa más segura:
    # montar un redis.conf con "requirepass" o usar un secret de Docker.
    # Se mantiene así por simplicidad; el riesgo es bajo (requiere acceso al host).
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - mte_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ================================
  # Backend Django
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    image: mtesive_app-backend:latest
    container_name: mte_backend_prod
    ports:
      # Solo loopback: Apache proxya desde 127.0.0.1. Evita exponer el backend en
      # HTTP plano por 0.0.0.0 (tokens en claro puenteando el TLS de Apache).
      - "127.0.0.1:${BACKEND_PORT:-3504}:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - port_postgres=5432
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SCADA_BASE_URL=${SCADA_BASE_URL}
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
      - PYDATAXM_VERIFY_SSL=${PYDATAXM_VERIFY_SSL:-true}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Subpath HTTPS detrás de Apache (DEPLOY_SIVE_SUBPATH.md); vacíos/False = raíz
      - FORCE_SCRIPT_NAME=${FORCE_SCRIPT_NAME:-}
      - STATIC_URL=${STATIC_URL:-static/}
      - USE_X_FORWARDED_HOST=${USE_X_FORWARDED_HOST:-False}
      - BEHIND_TLS_PROXY=${BEHIND_TLS_PROXY:-False}
      - DJANGO_SETTINGS_MODULE=core.settings
    volumes:
      - media_data_prod:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command: >
      sh -c "python manage.py migrate &&
             (python manage.py bootstrap_scada_if_empty || true) &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --threads 4 --worker-class gthread --timeout 120 --max-requests 1000 --max-requests-jitter 100 core.wsgi:application"

  # ================================
  # Worker de Celery
  # ================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    image: mtesive_app-celery_worker:latest
    container_name: mte_celery_worker_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - port_postgres=5432
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SCADA_BASE_URL=${SCADA_BASE_URL}
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
      - PYDATAXM_VERIFY_SSL=${PYDATAXM_VERIFY_SSL:-true}
      - DJANGO_SETTINGS_MODULE=core.settings
    volumes:
      - media_data_prod:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "core", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command: celery -A core worker -l info --concurrency=4 --max-tasks-per-child=1000

  # ================================
  # Scheduler de Celery Beat
  # ================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    image: mtesive_app-celery_beat:latest
    container_name: mte_celery_beat_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - port_postgres=5432
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SCADA_BASE_URL=${SCADA_BASE_URL}
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
      - PYDATAXM_VERIFY_SSL=${PYDATAXM_VERIFY_SSL:-true}
      - DJANGO_SETTINGS_MODULE=core.settings
    volumes:
      - media_data_prod:/app/media
      - ./logs:/app/logs
      - ./celerybeat-schedule:/app/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_network_prod
    restart: unless-stopped
    # Beat no expone HTTP; se desactiva el HEALTHCHECK heredado del Dockerfile
    # (curl :8000) que lo marca unhealthy falsamente. inspect ping no aplica a beat.
    healthcheck:
      test: ["NONE"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ================================
  # Frontend React
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Inyecta la URL del backend en build-time (Vite la incrusta en el bundle).
        # Por defecto usa http://DOMAIN_NAME:BACKEND_PORT (acceso directo por puerto).
        # Para el despliegue bajo subpath detrás de Apache, definir VITE_API_URL (o el
        # antiguo REACT_APP_API_URL, que se sigue aceptando) en el .env con la URL
        # pública, p. ej. https://mte.udenar.edu.co/sive
        VITE_API_URL: "${VITE_API_URL:-${REACT_APP_API_URL:-http://${DOMAIN_NAME}:${BACKEND_PORT}}}"
    image: mtesive_app-frontend:latest
    container_name: mte_frontend_prod
    ports:
      # Solo loopback: Apache proxya desde 127.0.0.1 hacia este puerto.
      - "127.0.0.1:${FRONTEND_PORT:-3503}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mte_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ================================
  # Nginx eliminado - Acceso directo a puertos
  # ================================

# ================================
# Volumes
# ================================
volumes:
  postgres_data_prod:
    driver: local
  # external: el volumen ya existía fuera de compose (de una corrida previa). Se marca
  # external para usar el existente sin recrearlo (silencia el WARN y, de paso, protege
  # los datos de un `down -v` accidental). En un despliegue NUEVO, crearlo antes:
  #   docker volume create mtesive_app_redis_data_prod
  redis_data_prod:
    external: true
    name: mtesive_app_redis_data_prod
  # Volumen con nombre para media (reportes, imágenes de perfil): compartido por backend/
  # celery de forma consistente sin importar desde qué carpeta se invoque compose. Antes
  # era el bind relativo ./media, cuyo host-path cambiaba según el directorio de invocación
  # -> el celery que ESCRIBE y el backend que LEE apuntaban a dirs distintos (404 al descargar).
  media_data_prod:
    driver: local

# ================================
# Networks
# ================================
networks:
  mte_network_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.44.0.0/16