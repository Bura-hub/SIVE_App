# =============================================================================
# SIVET bajo subpath /sivet/ en https://mte.udenar.edu.co  (Apache 2.4)
# =============================================================================
#
# Cómo usar:
#   Insertar este bloque DENTRO del <VirtualHost *:443> existente de
#   mte.udenar.edu.co (el que ya termina TLS con el certificado Let's Encrypt).
#   NO crea un VirtualHost nuevo ni toca el puerto/cert existentes.
#
#   Requiere los módulos: proxy, proxy_http, headers.
#     sudo a2enmod proxy proxy_http headers && sudo systemctl reload apache2
#
#   Puertos locales de los contenedores SIVET (docker-compose.prod.yml):
#     frontend -> 127.0.0.1:3503   |   backend -> 127.0.0.1:3504
#
# Reglas: las rutas del backend van PRIMERO (Apache usa el primer match) y
# el proxy ELIMINA el prefijo /sivet (Django lo re-agrega vía FORCE_SCRIPT_NAME=/sivet).
# El catch-all /sivet/ va al frontend al final.
# =============================================================================

    ProxyPreserveHost On
    ProxyRequests Off

    # Informa a Django que la conexión original es HTTPS (lo lee SECURE_PROXY_SSL_HEADER).
    RequestHeader set X-Forwarded-Proto "https"

    # --- Backend (Django/DRF) : se elimina el prefijo /sivet ---
    ProxyPass        /sivet/api/            http://127.0.0.1:3504/api/
    ProxyPassReverse /sivet/api/            http://127.0.0.1:3504/api/
    ProxyPass        /sivet/auth/           http://127.0.0.1:3504/auth/
    ProxyPassReverse /sivet/auth/           http://127.0.0.1:3504/auth/
    ProxyPass        /sivet/admin/          http://127.0.0.1:3504/admin/
    ProxyPassReverse /sivet/admin/          http://127.0.0.1:3504/admin/
    ProxyPass        /sivet/scada/          http://127.0.0.1:3504/scada/
    ProxyPassReverse /sivet/scada/          http://127.0.0.1:3504/scada/
    ProxyPass        /sivet/local/          http://127.0.0.1:3504/local/
    ProxyPassReverse /sivet/local/          http://127.0.0.1:3504/local/
    ProxyPass        /sivet/tasks/          http://127.0.0.1:3504/tasks/
    ProxyPassReverse /sivet/tasks/          http://127.0.0.1:3504/tasks/
    ProxyPass        /sivet/schema/         http://127.0.0.1:3504/schema/
    ProxyPassReverse /sivet/schema/         http://127.0.0.1:3504/schema/
    ProxyPass        /sivet/docs/           http://127.0.0.1:3504/docs/
    ProxyPassReverse /sivet/docs/           http://127.0.0.1:3504/docs/
    ProxyPass        /sivet/redocs/         http://127.0.0.1:3504/redocs/
    ProxyPassReverse /sivet/redocs/         http://127.0.0.1:3504/redocs/
    ProxyPass        /sivet/health/         http://127.0.0.1:3504/health/
    ProxyPassReverse /sivet/health/         http://127.0.0.1:3504/health/
    ProxyPass        /sivet/media/          http://127.0.0.1:3504/media/
    ProxyPassReverse /sivet/media/          http://127.0.0.1:3504/media/
    # Estáticos de Django (admin/DRF/Swagger), servidos por WhiteNoise. Se QUITA el
    # prefijo /sivet (igual que las rutas de app): WhiteNoise, con FORCE_SCRIPT_NAME,
    # recorta el script name de su prefijo y sirve en /django-static/ (verificado).
    # STATIC_URL=/sivet/django-static/ hace que el HTML de admin pida /sivet/django-static/...,
    # ruta propia que además evita colisión con los estáticos del frontend (/sivet/static/).
    ProxyPass        /sivet/django-static/  http://127.0.0.1:3504/django-static/
    ProxyPassReverse /sivet/django-static/  http://127.0.0.1:3504/django-static/

    # --- Frontend (React SPA servido por su nginx) : catch-all, va AL FINAL ---
    ProxyPass        /sivet/                http://127.0.0.1:3503/
    ProxyPassReverse /sivet/                http://127.0.0.1:3503/

    # /sivet -> /sivet/ (para que los assets relativos resuelvan bien)
    RedirectMatch permanent ^/sivet$ /sivet/
