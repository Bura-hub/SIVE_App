# =============================================================================
# SIVE bajo subpath /sive/ en https://mte.udenar.edu.co  (Apache 2.4)
# =============================================================================
#
# Cómo usar:
#   Insertar este bloque DENTRO del <VirtualHost *:443> existente de
#   mte.udenar.edu.co (el que ya termina TLS con el certificado Let's Encrypt).
#   NO crea un VirtualHost nuevo ni toca el puerto/cert existentes.
#
#   Requiere los módulos: proxy, proxy_http, headers.
#     sudo a2enmod proxy proxy_http headers && sudo systemctl reload apache2
#
#   Puertos locales de los contenedores SIVE (docker-compose.prod.yml):
#     frontend -> 127.0.0.1:3503   |   backend -> 127.0.0.1:3504
#
# Reglas: las rutas del backend van PRIMERO (Apache usa el primer match) y
# el proxy ELIMINA el prefijo /sive (Django lo re-agrega vía FORCE_SCRIPT_NAME=/sive).
# El catch-all /sive/ va al frontend al final.
# =============================================================================

    ProxyPreserveHost On
    ProxyRequests Off

    # Informa a Django que la conexión original es HTTPS (lo lee SECURE_PROXY_SSL_HEADER).
    RequestHeader set X-Forwarded-Proto "https"

    # --- Backend (Django/DRF) : se elimina el prefijo /sive ---
    ProxyPass        /sive/api/            http://127.0.0.1:3504/api/
    ProxyPassReverse /sive/api/            http://127.0.0.1:3504/api/
    ProxyPass        /sive/auth/           http://127.0.0.1:3504/auth/
    ProxyPassReverse /sive/auth/           http://127.0.0.1:3504/auth/
    ProxyPass        /sive/admin/          http://127.0.0.1:3504/admin/
    ProxyPassReverse /sive/admin/          http://127.0.0.1:3504/admin/
    ProxyPass        /sive/scada/          http://127.0.0.1:3504/scada/
    ProxyPassReverse /sive/scada/          http://127.0.0.1:3504/scada/
    ProxyPass        /sive/local/          http://127.0.0.1:3504/local/
    ProxyPassReverse /sive/local/          http://127.0.0.1:3504/local/
    ProxyPass        /sive/tasks/          http://127.0.0.1:3504/tasks/
    ProxyPassReverse /sive/tasks/          http://127.0.0.1:3504/tasks/
    ProxyPass        /sive/schema/         http://127.0.0.1:3504/schema/
    ProxyPassReverse /sive/schema/         http://127.0.0.1:3504/schema/
    ProxyPass        /sive/docs/           http://127.0.0.1:3504/docs/
    ProxyPassReverse /sive/docs/           http://127.0.0.1:3504/docs/
    ProxyPass        /sive/redocs/         http://127.0.0.1:3504/redocs/
    ProxyPassReverse /sive/redocs/         http://127.0.0.1:3504/redocs/
    ProxyPass        /sive/health/         http://127.0.0.1:3504/health/
    ProxyPassReverse /sive/health/         http://127.0.0.1:3504/health/
    ProxyPass        /sive/media/          http://127.0.0.1:3504/media/
    ProxyPassReverse /sive/media/          http://127.0.0.1:3504/media/
    # Estáticos de Django (admin/DRF/Swagger), servidos por WhiteNoise. Se QUITA el
    # prefijo /sive (igual que las rutas de app): WhiteNoise, con FORCE_SCRIPT_NAME,
    # recorta el script name de su prefijo y sirve en /django-static/ (verificado).
    # STATIC_URL=/sive/django-static/ hace que el HTML de admin pida /sive/django-static/...,
    # ruta propia que además evita colisión con los estáticos del frontend (/sive/static/).
    ProxyPass        /sive/django-static/  http://127.0.0.1:3504/django-static/
    ProxyPassReverse /sive/django-static/  http://127.0.0.1:3504/django-static/

    # --- Frontend (React SPA servido por su nginx) : catch-all, va AL FINAL ---
    ProxyPass        /sive/                http://127.0.0.1:3503/
    ProxyPassReverse /sive/                http://127.0.0.1:3503/

    # /sive -> /sive/ (para que los assets relativos resuelvan bien)
    RedirectMatch permanent ^/sive$ /sive/
